<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introducción a JS Avanzado</title>
  </head>
  <body>

      <main class="container mx-auto">
      <h1 id="titulo-principal" class="text-3xl text-green-600">Introducción a JS Avanzado</h1>
      <hr> <!-- bradlc.vscode-tailwindcss -->
      
      <button id="btn-ir" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded cursor-pointer px-3 py-1">Ir</button>

      <h2 id="subtitulo">Esto es un subtítulo</h2>

      <section id="contenedor-principal" class="flex gap-3 flex-wrap">
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 1</article>
        <article class="w-50 h-30 bg-yellow-600 text-center text-white">Contenido 2</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 3</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 4</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 5</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 6</article>
        <article class="w-50 h-30 bg-yellow-600 text-center text-white">Contenido 7</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 8</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 9</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 10</article>
      </section>

      <form id="formu" class="mt-4 w-100 h-80 mx-auto bg-amber-700">
        <div>
          <label for="lbl-nombre" class="text-white">Nombre</label>
          <input type="text" id="lbl-nombre" name="nombre-oficial">
        </div>

        <button class="bg-green-500 hover:bg-green-700 px-3 py-2 rounded-2xl cursor-pointer text-white">Enviar</button>
      </form>

<!-- !--------------------------------------------------------------------------------------------->
<!-- !--------------------------------------------------------------------------------------------->
<!-- !--------------------------------------------------------------------------------------------->

      <form id="integrador" class="mt-4 w-100 h-90 mx-auto p-10 bg-fuchsia-300">

        <h2 class="text-teal-500 text-3xl -mt-3">Formulario integrador</h2>
        <div class="mt-4">
          <label for="nombre" class="text-fuchsia-700">Nombre: </label>
          <input type="text" name="nombre" id="nombre" class="border-teal-600 border block">
          <small id="error-nombre"></small>
        </div>

        <div class="mt-4">
          <label for="correo" class="text-fuchsia-700">Correo: </label>
          <input type="text" name="email" id="correo" class="border-teal-600 border block">
          <small id="error-correo"></small>
        </div>

        <div class="mt-4">
          <label for="edad" class="text-fuchsia-700">Edad: </label>
          <input type="number" name="edad" id="edad" class="border-teal-600 border block">
          <small id="error-edad"></small>
        </div>

        <button class="bg-teal-400 hover:bg-teal-800 p-2 mt-4 cursor-pointer rounded-3xl border-teal-600 text-fuchsia-800">Enviar</button>

      </form>
      </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
